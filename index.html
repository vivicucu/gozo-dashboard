<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gozo 購物網站 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg: #0a0d12; --surface: #111520; --border: #1e2535;
    --accent: #4f8ef7; --accent2: #34d89a; --accent3: #f7a84f; --accent4: #f75f5f;
    --text: #e2e8f0; --muted: #64748b; --label: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 24px; }

  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
  .site-title { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .ctrl { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; padding: 7px 12px; cursor: pointer; outline: none; color-scheme: dark; }
  .date-sep { color: var(--muted); font-size: 12px; }

  .quick-btns { display: flex; gap: 4px; }
  .quick-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 11px; font-weight: 600; padding: 6px 10px; cursor: pointer; transition: all 0.15s; }
  .quick-btn:hover, .quick-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .last-update { font-size: 11px; color: var(--muted); }

  .loading-bar { height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; margin-bottom: 20px; animation: pulse 1.5s ease-in-out infinite; display: none; }
  .loading-bar.active { display: block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 12px 12px 0 0; }
  .kpi-card.blue::before { background: var(--accent); }
  .kpi-card.green::before { background: var(--accent2); }
  .kpi-card.orange::before { background: var(--accent3); }
  .kpi-card.red::before { background: var(--accent4); }
  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  .kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 600; line-height: 1; margin-bottom: 6px; }
  .kpi-sub { font-size: 10px; color: var(--muted); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--label); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.08em; }

  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { font-size: 10px; font-weight: 600; color: var(--muted); text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
  .data-table td { font-size: 12px; padding: 8px 8px; border-bottom: 1px solid rgba(30,37,53,0.5); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table td.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .rank { font-size: 10px; font-weight: 700; color: var(--muted); }

  .ch-bar-wrap { margin-bottom: 7px; }
  .ch-bar-lbl { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
  .ch-bar-name { color: var(--muted); }
  .ch-bar-val { font-family: 'JetBrains Mono', monospace; color: var(--text); font-size: 10px; }
  .ch-bar-track { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .ch-bar-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(.16,1,.3,1); }

  .badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .badge-good { background: rgba(52,216,154,0.12); color: var(--accent2); }
  .badge-warn { background: rgba(247,168,79,0.12); color: var(--accent3); }
  .badge-bad  { background: rgba(247,95,95,0.12);  color: var(--accent4); }

  .error-msg { color: var(--accent4); font-size: 11px; text-align: center; padding: 20px; }

  .alerts-section { margin-bottom:20px; }
  .alerts-title { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .alerts-row { display:flex; gap:10px; flex-wrap:wrap; }
  .alert-pill { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; flex:1; min-width:200px; }
  .alert-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .alert-text { color:var(--label); line-height:1.4; }
  .alert-text strong { color:var(--text); font-size:15px; }

  .funnel-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .funnel-name { font-size:11px; color:var(--muted); width:100px; flex-shrink:0; }
  .funnel-track { flex:1; height:22px; background:var(--bg); border-radius:4px; overflow:hidden; position:relative; }
  .funnel-fill { height:100%; border-radius:4px; transition:width 1s cubic-bezier(.16,1,.3,1); }
  .funnel-count { font-family:JetBrains Mono,monospace; font-size:11px; color:var(--text); width:70px; text-align:right; flex-shrink:0; }
  .funnel-pct { font-size:10px; color:var(--muted); width:36px; text-align:right; flex-shrink:0; }

  .conv-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
  .conv-row:last-child { border-bottom:none; }
  .conv-name { font-size:12px; color:var(--muted); }
  .conv-val { font-family:JetBrains Mono,monospace; font-size:14px; font-weight:600; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- 即時警示 -->
<header>
  <div>
    <div class="site-title">gozo 購物網站監控中心</div>
    <h1>關鍵數字儀表板</h1>
  </div>
  <div class="header-right">
    <!-- 快速日期按鈕 -->
    <div class="quick-btns">
      <button class="quick-btn" onclick="setQuick('week')">本週</button>
      <button class="quick-btn" onclick="setQuick('month')">本月</button>
      <button class="quick-btn" onclick="setQuick('quarter')">本季</button>
    </div>
    <!-- 自訂日期 -->
    <input type="date" class="ctrl" id="dateStart" onchange="applyDate()">
    <span class="date-sep">—</span>
    <input type="date" class="ctrl" id="dateEnd" onchange="applyDate()">
    <!-- 通路 -->
    <select class="ctrl" id="channelSelect" onchange="filterChannel()">
      <option value="all">全部通路</option>
      <option value="官網">官網</option>
      <option value="MOMO">MOMO</option>
      <option value="蝦皮">蝦皮</option>
    </select>
    <div class="last-update" id="lastUpdate">載入中...</div>
  </div>
</header>

<div class="alerts-section">
  <div class="alerts-title">即時警示</div>
  <div class="alerts-row" id="alertsBar"></div>
</div>
<div id="debugInfo" style="font-size:10px;color:var(--accent3);margin-bottom:8px;word-break:break-all"></div>
<div class="section-label">核心數字</div>
<div class="kpi-grid">
  <div class="kpi-card blue">
    <div class="kpi-label">GMV 折後金額</div>
    <div class="kpi-value" id="kpiGMV">—</div>
    <div class="kpi-sub" id="kpiGMVSub"></div>
  </div>
  <div class="kpi-card green">
    <div class="kpi-label">訂單數</div>
    <div class="kpi-value" id="kpiOrders">—</div>
    <div class="kpi-sub" id="kpiOrdersSub"></div>
  </div>
  <div class="kpi-card orange">
    <div class="kpi-label">平均訂單金額 AOV</div>
    <div class="kpi-value" id="kpiAOV">—</div>
    <div class="kpi-sub" id="kpiAOVSub"></div>
  </div>
  <div class="kpi-card red">
    <div class="kpi-label">退貨率</div>
    <div class="kpi-value" id="kpiReturn">—</div>
    <div class="kpi-sub" id="kpiReturnSub"></div>
  </div>
</div>

<!-- 轉換漏斗 -->
<div class="two-col" style="margin-bottom:20px">
  <div class="card">
    <div class="card-title">轉換漏斗（近 30 天）</div>
    <div id="funnelSection"><p style="color:var(--muted);font-size:12px;text-align:center;padding:20px">載入中...</p></div>
  </div>
  <div class="card">
    <div class="card-title">關鍵轉換率</div>
    <div id="conversionKPIs"></div>
  </div>
</div>

<!-- 近 7 日 GMV 趨勢 -->
<div class="card" style="margin-bottom:20px">
  <div class="card-title">近 7 日 每日 GMV 趨勢</div>
  <div style="position:relative;height:160px">
    <canvas id="trendChart"></canvas>
  </div>
</div>

<div class="two-col">
  <div class="card">
    <div class="card-title">熱銷商品 Top 10</div>
    <table class="data-table">
      <thead><tr><th>#</th><th>商品名稱</th><th>銷量</th><th>折後金額</th></tr></thead>
      <tbody id="topProducts"><tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">載入中...</td></tr></tbody>
    </table>
  </div>
  <div class="card">
    <div class="card-title">各通路 GMV 佔比</div>
    <div id="channelBars" style="margin-bottom:20px"></div>
    <div class="card-title">退貨率分析</div>
    <table class="data-table">
      <thead><tr><th>通路</th><th>銷貨數</th><th>退貨數</th><th>退貨率</th></tr></thead>
      <tbody id="returnTable"><tr><td colspan="4" style="text-align:center;color:var(--muted);padding:16px">載入中...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- GA4 流量來源 -->
<div class="section-label" style="margin-top:8px">GA4 流量分析</div>
<div class="two-col">
  <div class="card">
    <div class="card-title">流量來源 Top 10（活躍使用者）</div>
    <div id="ga4TrafficBars"></div>
  </div>
  <div class="card">
    <div class="card-title">流量來源明細</div>
    <table class="data-table">
      <thead><tr><th>#</th><th>來源/媒介</th><th>使用者</th><th>工作階段</th></tr></thead>
      <tbody id="ga4TrafficTable"><tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">載入中...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const SHEET_ID = '1WY5XCvZ5_qb9HpmlxPKJ7tAMG5OpLZ7QSSUKPUJQ1gk';
const SHEET_NAME = '工作表1';

const GA4_SHEET_ID = '1D0iWELC8Xt3VUO23jaBpO6XT4eNTZZYP0yOgvCf9gKI';
const GA4_SHEET_NAME = '流量來源';
const GA4_EVENTS_SHEET_ID = '1r3yBJgCKKr-hNgRmydcmqvj5TmjxcLQY3Yloq5rxYvw';
const GA4_EVENTS_SHEET_NAME = '流量來源';
let ga4Events = {};
let ga4Data = [];

async function fetchGA4Events() {
  const url = `https://docs.google.com/spreadsheets/d/${GA4_EVENTS_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(GA4_EVENTS_SHEET_NAME)}&range=A15:C50`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    ga4Events = {};
    if (json.table && json.table.rows) {
      json.table.rows.forEach(row => {
        if (!row.c || !row.c[0] || !row.c[0].v) return;
        const name = String(row.c[0].v).trim();
        if (!name || name === 'eventName') return;
        ga4Events[name] = {
          count: Number((row.c[1] && row.c[1].v) || 0),
          users: Number((row.c[2] && row.c[2].v) || 0),
        };
      });
    }
    renderAlerts();
    renderFunnel();
  } catch(e) {
    console.error('GA4 Events error:', e);
  }
}

function renderAlerts() {
  const sessionStart = (ga4Events['session_start'] || {}).count || 0;
  const addToCart   = (ga4Events['add_to_cart'] || {}).count || 0;
  const beginCheckout = (ga4Events['begin_checkout'] || {}).count || 0;
  const purchase    = (ga4Events['purchase'] || {}).count || 0;

  const convRate = sessionStart > 0 ? (purchase / sessionStart * 100).toFixed(2) : 0;
  const abandonRate = beginCheckout > 0 ? ((1 - purchase / beginCheckout) * 100).toFixed(1) : 0;
  const cartRate = sessionStart > 0 ? (addToCart / sessionStart * 100).toFixed(1) : 0;

  const alerts = [];

  // 棄單率警示
  if (abandonRate > 70) {
    alerts.push({ color: 'var(--accent4)', text: `棄單率 <strong>${abandonRate}%</strong> — 超過警戒值（70%）` });
  } else if (abandonRate > 60) {
    alerts.push({ color: 'var(--accent3)', text: `棄單率 <strong>${abandonRate}%</strong> — 需注意` });
  } else {
    alerts.push({ color: 'var(--accent2)', text: `棄單率 <strong>${abandonRate}%</strong> — 正常` });
  }

  // 轉換率
  if (convRate < 0.5) {
    alerts.push({ color: 'var(--accent4)', text: `轉換率 <strong>${convRate}%</strong> — 偏低` });
  } else {
    alerts.push({ color: 'var(--accent2)', text: `轉換率 <strong>${convRate}%</strong> — 正常` });
  }

  // 加購率
  alerts.push({ color: 'var(--accent3)', text: `加購率 <strong>${cartRate}%</strong>（近 30 天）` });

  document.getElementById('alertsBar').innerHTML = alerts.map(a => `
    <div class="alert-pill">
      <div class="alert-dot" style="background:${a.color}"></div>
      <span class="alert-text">${a.text}</span>
    </div>`).join('');
}

function renderFunnel() {
  const sessionStart  = (ga4Events['session_start'] || {}).count || 0;
  const viewItem      = (ga4Events['view_item'] || {}).count || 0;
  const addToCart     = (ga4Events['add_to_cart'] || {}).count || 0;
  const beginCheckout = (ga4Events['begin_checkout'] || {}).count || 0;
  const purchase      = (ga4Events['purchase'] || {}).count || 0;

  const steps = [
    { name: '工作階段', count: sessionStart, color: '#4f8ef7' },
    { name: '瀏覽商品', count: viewItem,     color: '#6ba4f9' },
    { name: '加入購物車', count: addToCart,  color: '#34d89a' },
    { name: '前往結帳',  count: beginCheckout, color: '#f7a84f' },
    { name: '完成購買',  count: purchase,    color: '#a78bfa' },
  ];

  const maxVal = sessionStart || 1;
  document.getElementById('funnelSection').innerHTML = steps.map(s => {
    const pct = (s.count / maxVal * 100).toFixed(1);
    const stepPct = s === steps[0] ? '100%' : `${(s.count / maxVal * 100).toFixed(1)}%`;
    return `<div class="funnel-row">
      <div class="funnel-name">${s.name}</div>
      <div class="funnel-track">
        <div class="funnel-fill" style="width:${pct}%;background:${s.color}20;border-left:3px solid ${s.color}"></div>
      </div>
      <div class="funnel-count">${s.count.toLocaleString()}</div>
      <div class="funnel-pct">${stepPct}</div>
    </div>`;
  }).join('');

  // Conversion KPIs
  const convRate    = sessionStart > 0 ? (purchase / sessionStart * 100).toFixed(2) : 0;
  const abandonRate = beginCheckout > 0 ? ((1 - purchase / beginCheckout) * 100).toFixed(1) : 0;
  const cartRate    = sessionStart > 0 ? (addToCart / sessionStart * 100).toFixed(1) : 0;
  const checkoutRate = addToCart > 0 ? (beginCheckout / addToCart * 100).toFixed(1) : 0;

  document.getElementById('conversionKPIs').innerHTML = `
    <div class="conv-row"><span class="conv-name">整體轉換率</span><span class="conv-val" style="color:var(--accent)">${convRate}%</span></div>
    <div class="conv-row"><span class="conv-name">棄單率</span><span class="conv-val" style="color:${abandonRate > 70 ? 'var(--accent4)' : 'var(--accent3)'}">${abandonRate}%</span></div>
    <div class="conv-row"><span class="conv-name">加購率</span><span class="conv-val" style="color:var(--accent2)">${cartRate}%</span></div>
    <div class="conv-row"><span class="conv-name">結帳率（加購→結帳）</span><span class="conv-val">${checkoutRate}%</span></div>
    <div class="conv-row"><span class="conv-name">工作階段數</span><span class="conv-val">${sessionStart.toLocaleString()}</span></div>
    <div class="conv-row"><span class="conv-name">完成購買次數</span><span class="conv-val">${purchase.toLocaleString()}</span></div>
  `;
}

async function fetchGA4Data() {
  // 使用 query 從第15行開始抓（跳過標題區）
  const url = `https://docs.google.com/spreadsheets/d/${GA4_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(GA4_SHEET_NAME)}&range=A15:D315`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    
    ga4Data = [];
    if (json.table && json.table.rows) {
      json.table.rows.forEach(row => {
        if (!row.c || !row.c[0] || !row.c[0].v) return;
        const source = String(row.c[0].v).trim();
        // 跳過標題行和空行
        if (!source || source === 'sessionSourceMedium' || source === 'sessionSourceM') return;
        ga4Data.push({
          source: source,
          activeUsers: Number((row.c[1] && row.c[1].v) || 0),
          sessions: Number((row.c[2] && row.c[2].v) || 0),
          newUsers: Number((row.c[3] && row.c[3].v) || 0),
        });
      });
    }
    renderGA4();
  } catch(e) {
    console.error('GA4 fetch error:', e);
    document.getElementById('ga4TrafficTable').innerHTML = '<tr><td colspan="4" class="error-msg">⚠️ GA4 資料載入失敗，請確認試算表權限為「知道連結的任何人可檢視」</td></tr>';
  }
}

function renderGA4() {
  const sorted = [...ga4Data]
    .sort((a, b) => b.activeUsers - a.activeUsers)
    .slice(0, 10);

  if (!sorted.length) {
    document.getElementById('ga4TrafficBars').innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:20px">無資料</p>';
    document.getElementById('ga4TrafficTable').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">無資料</td></tr>';
    return;
  }

  const maxVal = sorted[0].activeUsers || 1;
  const colors = ['#4f8ef7','#34d89a','#f7a84f','#a78bfa','#f75f5f','#06d6a0','#f472b6','#fb923c','#facc15','#64748b'];

  document.getElementById('ga4TrafficBars').innerHTML = sorted.map((row, i) => {
    const pct = (row.activeUsers / maxVal * 100).toFixed(1);
    return `<div class="ch-bar-wrap">
      <div class="ch-bar-lbl">
        <span class="ch-bar-name" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${row.source}">${row.source}</span>
        <span class="ch-bar-val">${row.activeUsers.toLocaleString()}</span>
      </div>
      <div class="ch-bar-track">
        <div class="ch-bar-fill" style="width:${pct}%;background:${colors[i]}"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('ga4TrafficTable').innerHTML = sorted.map((row, i) => `
    <tr>
      <td class="rank">${i+1}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${row.source}">${row.source}</td>
      <td class="mono">${row.activeUsers.toLocaleString()}</td>
      <td class="mono">${row.sessions.toLocaleString()}</td>
    </tr>`).join('');
}
const EXCLUDE_PRODUCTS = ['電商運費', '購物金(紅利)', '購物金（紅利）'];

let allData = [];
let startDate = null;
let endDate = null;
let currentChannel = 'all';

function getChannelGroup(p) {
  if (!p) return '其他';
  if (p.includes('台灣官網') && p.startsWith('G_')) return '官網';
  if (p.includes('Momo') || p.includes('momo')) return 'MOMO';
  if (p.includes('蝦皮')) return '蝦皮';
  return '其他';
}

// 初始化日期：本月
function initDates() {
  const now = new Date();
  const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
  startDate = firstDay;
  endDate = now;
  document.getElementById('dateStart').value = fmt(firstDay);
  document.getElementById('dateEnd').value = fmt(now);
}

function fmt(d) {
  return d.toISOString().slice(0, 10);
}

function setQuick(period) {
  const now = new Date();
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (period === 'week') {
    const day = now.getDay() || 7;
    startDate = new Date(now); startDate.setDate(now.getDate() - day + 1);
    endDate = now;
  } else if (period === 'month') {
    startDate = new Date(now.getFullYear(), now.getMonth(), 1);
    endDate = now;
  } else if (period === 'quarter') {
    const q = Math.floor(now.getMonth() / 3);
    startDate = new Date(now.getFullYear(), q * 3, 1);
    endDate = now;
  }
  document.getElementById('dateStart').value = fmt(startDate);
  document.getElementById('dateEnd').value = fmt(endDate);
  renderAll();
}

function applyDate() {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  startDate = new Date(document.getElementById('dateStart').value);
  endDate = new Date(document.getElementById('dateEnd').value);
  endDate.setHours(23, 59, 59);
  renderAll();
}

function filterChannel() {
  currentChannel = document.getElementById('channelSelect').value;
  renderAll();
}

async function fetchSheetData() {
  document.getElementById('loadingBar').classList.add('active');
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const cols = json.table.cols.map(c => c.label);
    allData = json.table.rows.map(row => {
      const obj = {};
      cols.forEach((col, i) => {
        const cell = row.c[i];
        obj[col] = cell ? (cell.v !== null ? cell.v : '') : '';
      });
      return obj;
    }).filter(r => {
      const p = r['電商平台'] || '';
      return p.startsWith('G_') && !p.startsWith('R_') && !p.startsWith('M_');
    });

    document.getElementById('lastUpdate').textContent = `更新：${new Date().toLocaleString('zh-TW')}`;
    
    // 偵錯：顯示前3筆結帳時間的原始格式
    const sample = allData.slice(0, 3).map(r => {
      const raw = r['結帳時間'];
      return `type:${typeof raw} val:${JSON.stringify(raw)}`;
    }).join(' | ');
    document.getElementById('debugInfo').textContent = '日期格式：' + sample;
    
    renderAll();
  } catch (err) {
    document.getElementById('lastUpdate').textContent = '⚠️ 載入失敗';
    document.getElementById('topProducts').innerHTML = '<tr><td colspan="4" class="error-msg">⚠️ 無法載入，請確認試算表權限為「知道連結的任何人可檢視」</td></tr>';
  }
  document.getElementById('loadingBar').classList.remove('active');
}

function getFiltered() {
  return allData.filter(r => {
    // 日期篩選
    if (startDate && endDate) {
      const raw = r['結帳時間'];
      if (!raw) return false;
      let d;
      if (typeof raw === 'number') {
        d = new Date((raw - 25569) * 86400 * 1000);
      } else if (typeof raw === 'string' && raw.startsWith('Date(')) {
        const parts = raw.match(/Date\((\d+),(\d+),(\d+)/);
        if (parts) d = new Date(+parts[1], +parts[2], +parts[3]);
      } else if (typeof raw === 'string') {
        // 格式: "2026-05-01 00:00:00" 直接取前10碼
        d = new Date(raw.substring(0, 10));
      } else {
        d = new Date(raw);
      }
      if (!d || isNaN(d)) return false;
      // 只比較日期部分
      const dStr = d.toISOString().slice(0, 10);
      const sStr = startDate.toISOString().slice(0, 10);
      const eStr = endDate.toISOString().slice(0, 10);
      if (dStr < sStr || dStr > eStr) return false;
    }
    // 通路篩選
    if (currentChannel !== 'all') {
      if (getChannelGroup(r['電商平台']) !== currentChannel) return false;
    }
    return true;
  });
}

function renderAll() {
  const data = getFiltered();
  renderKPIs(data);
  renderTopProducts(data);
  renderChannelBars();
  renderReturnTable();
  renderTrend();
}

function renderKPIs(data) {
  const sales = data.filter(r => Number(r['銷售量']) > 0);
  const returns = data.filter(r => Number(r['銷售量']) < 0);

  const gmv = sales.reduce((s, r) => s + (Number(r['折後金額']) || 0), 0);
  document.getElementById('kpiGMV').textContent = '$' + Math.round(gmv).toLocaleString('zh-TW');
  document.getElementById('kpiGMVSub').textContent = `${sales.length.toLocaleString()} 筆銷售記錄`;

  const orderSet = new Set(sales.map(r => r['來源單號']).filter(Boolean));
  document.getElementById('kpiOrders').textContent = orderSet.size.toLocaleString('zh-TW');
  document.getElementById('kpiOrdersSub').textContent = '不重複訂單數';

  const aov = orderSet.size > 0 ? Math.round(gmv / orderSet.size) : 0;
  document.getElementById('kpiAOV').textContent = '$' + aov.toLocaleString('zh-TW');
  document.getElementById('kpiAOVSub').textContent = 'GMV ÷ 訂單數';

  const salesQty = sales.reduce((s, r) => s + Math.abs(Number(r['銷售量']) || 0), 0);
  const returnQty = returns.reduce((s, r) => s + Math.abs(Number(r['銷售量']) || 0), 0);
  const rate = salesQty > 0 ? (returnQty / salesQty * 100).toFixed(1) : 0;
  document.getElementById('kpiReturn').textContent = rate + '%';
  document.getElementById('kpiReturnSub').textContent = `退貨 ${returnQty} ÷ 銷貨 ${salesQty}`;
}

function renderTopProducts(data) {
  const sales = data.filter(r => Number(r['銷售量']) > 0 && !EXCLUDE_PRODUCTS.includes(r['品名']));
  const map = {};
  sales.forEach(r => {
    const n = r['品名'] || '未知';
    if (!map[n]) map[n] = { qty: 0, amt: 0 };
    map[n].qty += Number(r['銷售量']) || 0;
    map[n].amt += Number(r['折後金額']) || 0;
  });
  const sorted = Object.entries(map).sort((a, b) => b[1].qty - a[1].qty).slice(0, 10);
  const tbody = document.getElementById('topProducts');
  if (!sorted.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">此日期範圍無資料</td></tr>'; return; }
  tbody.innerHTML = sorted.map(([name, d], i) => `
    <tr>
      <td class="rank">${i+1}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${name}">${name}</td>
      <td class="mono">${d.qty.toLocaleString()}</td>
      <td class="mono">$${Math.round(d.amt).toLocaleString()}</td>
    </tr>`).join('');
}

function renderChannelBars() {
  // 通路佔比用全部篩選後資料（含日期，但不含通路篩選）
  const data = allData.filter(r => {
    if (startDate && endDate) {
      const raw = r['結帳時間'];
      if (!raw) return false;
      let d;
      if (typeof raw === 'number') d = new Date((raw - 25569) * 86400 * 1000);
      else if (typeof raw === 'string' && raw.startsWith('Date(')) {
        const parts = raw.match(/Date\((\d+),(\d+),(\d+)/);
        if (parts) d = new Date(+parts[1], +parts[2], +parts[3]);
      } else d = new Date(raw);
      if (!d || isNaN(d) || d < startDate || d > endDate) return false;
    }
    return Number(r['銷售量']) > 0;
  });

  const map = {};
  data.forEach(r => {
    const g = getChannelGroup(r['電商平台']);
    if (!map[g]) map[g] = 0;
    map[g] += Number(r['折後金額']) || 0;
  });
  const total = Object.values(map).reduce((s, v) => s + v, 0);
  const colors = { '官網': '#4f8ef7', 'MOMO': '#f7a84f', '蝦皮': '#34d89a', '其他': '#64748b' };
  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);
  document.getElementById('channelBars').innerHTML = sorted.map(([name, val]) => {
    const pct = total > 0 ? (val / total * 100).toFixed(1) : 0;
    return `<div class="ch-bar-wrap">
      <div class="ch-bar-lbl"><span class="ch-bar-name">${name}</span><span class="ch-bar-val">${pct}% · $${Math.round(val).toLocaleString()}</span></div>
      <div class="ch-bar-track"><div class="ch-bar-fill" style="width:${pct}%;background:${colors[name]||'#64748b'}"></div></div>
    </div>`;
  }).join('');
}

function renderReturnTable() {
  const data = allData.filter(r => {
    if (startDate && endDate) {
      const raw = r['結帳時間'];
      if (!raw) return false;
      let d;
      if (typeof raw === 'number') d = new Date((raw - 25569) * 86400 * 1000);
      else if (typeof raw === 'string' && raw.startsWith('Date(')) {
        const parts = raw.match(/Date\((\d+),(\d+),(\d+)/);
        if (parts) d = new Date(+parts[1], +parts[2], +parts[3]);
      } else d = new Date(raw);
      if (!d || isNaN(d) || d < startDate || d > endDate) return false;
    }
    return true;
  });

  const map = {};
  data.forEach(r => {
    const g = getChannelGroup(r['電商平台']);
    if (!map[g]) map[g] = { sales: 0, returns: 0 };
    const qty = Number(r['銷售量']) || 0;
    if (qty > 0) map[g].sales += qty;
    if (qty < 0) map[g].returns += Math.abs(qty);
  });
  const tbody = document.getElementById('returnTable');
  tbody.innerHTML = Object.entries(map).sort((a,b) => b[1].sales - a[1].sales).map(([name, d]) => {
    const rate = d.sales > 0 ? (d.returns / d.sales * 100).toFixed(1) : 0;
    const cls = rate > 20 ? 'badge-bad' : rate > 10 ? 'badge-warn' : 'badge-good';
    return `<tr><td>${name}</td><td class="mono">${d.sales.toLocaleString()}</td><td class="mono">${d.returns.toLocaleString()}</td><td><span class="badge ${cls}">${rate}%</span></td></tr>`;
  }).join('');
}


function renderTrend() {
  // 計算近 7 日（從今天往回數 7 天）
  const today = new Date();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }

  // 彙總每日 GMV（只計算銷貨，排除退貨）
  const dailyGMV = {};
  days.forEach(d => dailyGMV[d] = 0);

  allData.forEach(r => {
    if (Number(r['銷售量']) <= 0) return;
    const raw = r['結帳時間'];
    if (!raw) return;
    let dateStr;
    if (typeof raw === 'string') {
      if (raw.startsWith('Date(')) {
        const parts = raw.match(/Date\((\d+),(\d+),(\d+)/);
        if (parts) { const d = new Date(+parts[1], +parts[2], +parts[3]); dateStr = fmt(d); }
      } else { dateStr = raw.substring(0, 10).replace(/\//g, '-'); }
    } else if (typeof raw === 'number') { dateStr = fmt(new Date((raw - 25569) * 86400 * 1000)); }
    if (days.includes(dateStr)) {
      dailyGMV[dateStr] += Number(r['折後金額']) || 0;
    }
  });

  const labels = days.map(d => d.slice(5)); // MM-DD
  const values = days.map(d => Math.round(dailyGMV[d]));
  const maxVal = Math.max(...values) || 1;

  // 用 SVG 畫折線圖
  const W = 800, H = 140, PAD = 40;
  const pw = W - PAD * 2;
  const ph = H - PAD;

  const points = values.map((v, i) => {
    const x = PAD + (i / (days.length - 1)) * pw;
    const y = PAD + (1 - v / maxVal) * ph;
    return [x, y];
  });

  const pathD = points.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const areaD = `${pathD} L${points[points.length-1][0]},${H} L${points[0][0]},${H} Z`;

  const dotsSVG = points.map((p, i) => `
    <circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#4f8ef7" stroke="#0a0d12" stroke-width="2"/>
    <text x="${p[0]}" y="${p[1]-10}" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">$${(values[i]/10000).toFixed(1)}萬</text>
  `).join('');

  const labelsSVG = labels.map((l, i) => {
    const x = PAD + (i / (days.length - 1)) * pw;
    return `<text x="${x}" y="${H+4}" text-anchor="middle" fill="#64748b" font-size="10" font-family="Inter,sans-serif">${l}</text>`;
  }).join('');

  document.getElementById('trendChart').outerHTML = `
    <svg id="trendChart" viewBox="0 0 ${W} ${H+16}" style="width:100%;height:100%" preserveAspectRatio="none">
      <defs>
        <linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaD}" fill="url(#trendGrad)"/>
      <path d="${pathD}" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linejoin="round"/>
      ${dotsSVG}
      ${labelsSVG}
    </svg>`;
}

initDates();
fetchSheetData();
fetchGA4Data();
fetchGA4Events();
</script>
